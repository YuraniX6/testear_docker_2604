version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: mysql_login
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: login
      MYSQL_USER: javiyura
      MYSQL_PASSWORD: yurani
    ports:
      - "3310:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql